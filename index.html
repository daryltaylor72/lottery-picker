<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Daryl's Lucky Numbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-pale: #FBF3DE;
      --ink: #1A1A1A;
      --ink-soft: #5A5A5A;
      --cream: #FDFAF4;
      --border: #E8E0CC;
      --ball-r: 52px;
      --radius: 12px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 420px;
      width: 100%;
    }

    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-star {
      font-size: 22px;
      color: var(--gold);
      animation: spin 12s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
    }

    .subtitle {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--ink-soft);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.97rem;
      font-weight: 400;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }

    /* Custom select arrow */
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* Multi-date section */
    .dates-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .date-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-row input {
      flex: 1;
    }

    .btn-remove {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink-soft);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
      padding: 0;
      line-height: 1;
    }
    .btn-remove:hover { background: #fee; color: #c00; border-color: #fcc; }

    .btn-add-date {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gold);
      background: none;
      border: 1px dashed var(--gold-light);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-add-date:hover { background: var(--gold-pale); }

    /* ── State Toggle (iOS pill style) ── */
    .state-toggle {
      display: flex;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .state-toggle button {
      flex: 1;
      padding: 9px 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
      letter-spacing: 0.04em;
    }

    .state-toggle button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    }

    .state-toggle button:hover:not(.active) {
      background: rgba(255,255,255,0.6);
      color: var(--ink);
    }

    /* ── Play Type Cards ── */
    .play-type-section {
      margin-bottom: 20px;
      animation: fadeIn 0.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .play-type-grid {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .play-type-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--cream);
    }

    .play-type-card:hover {
      border-color: var(--gold-light);
      background: var(--gold-pale);
    }

    .play-type-card.selected {
      border-color: var(--gold);
      background: var(--gold-pale);
    }

    .play-type-card input[type="radio"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: var(--gold);
      cursor: pointer;
    }

    .play-type-info {
      flex: 1;
    }

    .play-type-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .play-type-desc {
      font-size: 0.76rem;
      font-weight: 300;
      color: var(--ink-soft);
      line-height: 1.4;
    }

    /* ── Generate Button ── */
    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:hover { background: #333; }

    .btn-generate .star-burst {
      display: inline-block;
      margin-right: 8px;
      transition: transform 0.3s;
    }
    .btn-generate:hover .star-burst { transform: rotate(90deg) scale(1.2); }

    /* ── Results ── */
    .results {
      width: 100%;
      max-width: 440px;
      margin-top: 24px;
    }

    .result-block {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.04);
      animation: slideUp 0.35s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-block:nth-child(2) { animation-delay: 0.05s; }
    .result-block:nth-child(3) { animation-delay: 0.1s; }

    .result-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 16px;
    }

    .balls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .ball {
      width: var(--ball-r);
      height: var(--ball-r);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: #fff;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: ballPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      flex-shrink: 0;
    }

    @keyframes ballPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Ball color themes per lottery */
    .ball.white  { background: linear-gradient(135deg, #4A90D9 0%, #2C5F9E 100%); }
    .ball.power  { background: linear-gradient(135deg, #E84545 0%, #B01F1F 100%); }
    .ball.mega   { background: linear-gradient(135deg, #F5A623 0%, #C07000 100%); }
    .ball.pick3  { background: linear-gradient(135deg, #5CB85C 0%, #2E7B2E 100%); }
    .ball.pick4  { background: linear-gradient(135deg, #9B59B6 0%, #6C2A8A 100%); }
    .ball.pick5  { background: linear-gradient(135deg, #E67E22 0%, #A04B00 100%); }
    .ball.cash5  { background: linear-gradient(135deg, #E67E22 0%, #A04B00 100%); }
    .ball.gold   { background: linear-gradient(135deg, #C9A84C 0%, #8C6B1A 100%); }

    /* Ball stagger */
    .ball:nth-child(1) { animation-delay: 0.00s; }
    .ball:nth-child(2) { animation-delay: 0.06s; }
    .ball:nth-child(3) { animation-delay: 0.12s; }
    .ball:nth-child(4) { animation-delay: 0.18s; }
    .ball:nth-child(5) { animation-delay: 0.24s; }
    .ball:nth-child(6) { animation-delay: 0.30s; }

    .separator {
      font-size: 1.5rem;
      color: var(--border);
      align-self: center;
      margin: 0 2px;
    }

    /* ── Smart Recommendation Callout ── */
    .recommendation {
      margin-top: 14px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #FBF3DE 0%, #F7ECCC 100%);
      border: 1px solid var(--gold-light);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--ink);
      line-height: 1.5;
      animation: fadeIn 0.3s ease 0.4s both;
    }

    .recommendation strong {
      color: #8C6B1A;
    }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
      opacity: 0.6;
    }

    /* ── Session counter ── */
    .session-counter {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-top: 32px;
      margin-bottom: 0;
      opacity: 1;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-soft);
      font-size: 0.9rem;
      font-weight: 300;
    }
    .empty-icon { font-size: 2.4rem; margin-bottom: 12px; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Generate count ── */
    .gen-count {
      font-size: 0.72rem;
      color: var(--ink-soft);
      text-align: center;
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    /* ── Numerology Panel ── */
    .numerology-panel {
      width: 100%;
      max-width: 440px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #FBF3DE 0%, #F5EAC8 100%);
      border: 1px solid var(--gold-light);
      border-radius: var(--radius);
      padding: 18px 20px;
      animation: fadeIn 0.3s ease both;
    }

    .numerology-panel .num-header {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8C6B1A;
      margin-bottom: 12px;
    }

    .num-numbers {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .num-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .num-badge .num-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .num-badge .num-label {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8C6B1A;
      opacity: 0.8;
    }

    .num-influence {
      margin-top: 10px;
      font-size: 0.75rem;
      font-weight: 300;
      color: #6B4F10;
      line-height: 1.5;
    }

    /* Hidden utility */
    .hidden { display: none !important; }
  </style>
</head>

<script>
// ── PRNG (seeded Mulberry32) ──────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Hash string → 32-bit integer ─────────────────────────────────────────
function hashStr(s) {
  let h = 0x811C9DC5;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h;
}

// ── Build seed from user inputs ───────────────────────────────────────────
function buildSeed(name, dates, favorites, salt) {
  const raw = [
    name.toLowerCase().trim(),
    dates.join('|'),
    favorites.replace(/\s/g, ''),
    String(salt)
  ].join('::');
  return hashStr(raw);
}

// ── Pick unique numbers in range [min, max] (inclusive) ──────────────────
function pickUnique(rng, count, min, max) {
  const pool = [];
  for (let i = min; i <= max; i++) pool.push(i);
  // Fisher-Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, count).sort((a, b) => a - b);
}

// ── Pick digit (0–9) with replacement ────────────────────────────────────
function pickDigits(rng, count) {
  const digits = [];
  for (let i = 0; i < count; i++) digits.push(Math.floor(rng() * 10));
  return digits;
}

// ── Smart Recommendation for Pick 3 / Pick 4 ─────────────────────────────
function getRecommendation(digits) {
  const unique = new Set(digits).size;
  if (unique === 1) {
    // All same (e.g. 777)
    return '💡 <strong>Recommended: Exact Order</strong> — all identical digits, max payout on exact match.';
  }
  // Count pairs
  const freq = {};
  digits.forEach(d => { freq[d] = (freq[d] || 0) + 1; });
  const hasPair = Object.values(freq).some(v => v === 2);
  if (hasPair && unique === digits.length - 1) {
    // One pair (e.g. 223, 331)
    const combos = digits.length === 3 ? 3 : 6;
    return `💡 <strong>Recommended: Any Order</strong> — one repeated digit gives you ${combos} combinations at better odds.`;
  }
  // All different
  const allDiffCombos = digits.length === 3 ? 6 : 24;
  return `💡 <strong>Recommended: 50/50</strong> — all unique digits give you ${allDiffCombos} any-order combinations at half cost.`;
}

// ── Render a result block ─────────────────────────────────────────────────
function renderResult(data, label, showRecommendation) {
  const block = document.createElement('div');
  block.className = 'result-block';

  const lbl = document.createElement('div');
  lbl.className = 'result-label';
  lbl.textContent = label;
  block.appendChild(lbl);

  const row = document.createElement('div');
  row.className = 'balls-row';

  if (data.digits) {
    // Pick 3 / Pick 4
    const colorMap = { pick3: 'pick3', pick4: 'pick4' };
    const cls = colorMap[data.type] || 'pick3';
    data.digits.forEach((d, i) => {
      const ball = document.createElement('div');
      ball.className = `ball ${cls}`;
      ball.style.animationDelay = `${i * 0.07}s`;
      ball.textContent = d;
      row.appendChild(ball);
    });
  } else {
    // Powerball / Mega Millions / Pick 5 / Cash 5 / Palmetto
    const whiteCls = (data.type === 'pick5' || data.type === 'cash5') ? data.type : 'white';
    data.whites.forEach((n, i) => {
      const ball = document.createElement('div');
      ball.className = `ball ${whiteCls}`;
      ball.style.animationDelay = `${i * 0.07}s`;
      ball.textContent = n;
      row.appendChild(ball);
    });

    if (data.bonus) {
      const sep = document.createElement('span');
      sep.className = 'separator';
      sep.textContent = '+';
      row.appendChild(sep);

      const bonus = document.createElement('div');
      const bonusCls = data.type === 'megamillions' ? 'mega' : 'power';
      bonus.className = `ball ${bonusCls}`;
      bonus.style.animationDelay = `${data.whites.length * 0.07 + 0.07}s`;
      bonus.textContent = data.bonus[0];
      row.appendChild(bonus);
    }
  }

  block.appendChild(row);

  // Smart recommendation for Pick 3 / Pick 4
  if (data.digits && showRecommendation) {
    const rec = document.createElement('div');
    rec.className = 'recommendation';
    rec.innerHTML = getRecommendation(data.digits);
    block.appendChild(rec);
  }

  return block;
}

// ── Numerology Engine ─────────────────────────────────────────────────────

// Reduce a number to a single digit (preserve 11, 22, 33 as master numbers)
function reduceNum(n) {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = String(n).split('').reduce((s, d) => s + parseInt(d), 0);
  }
  return n;
}

// Life Path: sum all digits of YYYY-MM-DD
function calcLifePath(dateStr) {
  if (!dateStr) return null;
  const digits = dateStr.replace(/-/g, '').split('').map(Number);
  return reduceNum(digits.reduce((a, b) => a + b, 0));
}

// Expression (name) number: A=1..I=9, J=1..R=9, S=1..Z=8
const LETTER_MAP = 'abcdefghijklmnopqrstuvwxyz';
const LETTER_VAL = [1,2,3,4,5,6,7,8,9,1,2,3,4,5,6,7,8,9,1,2,3,4,5,6,7,8];
function calcExpression(name) {
  if (!name.trim()) return null;
  const sum = name.toLowerCase().split('').reduce((acc, c) => {
    const idx = LETTER_MAP.indexOf(c);
    return idx >= 0 ? acc + LETTER_VAL[idx] : acc;
  }, 0);
  return reduceNum(sum);
}

// Destiny = Life Path + Expression, reduced
function calcDestiny(lp, ex) {
  if (!lp || !ex) return null;
  return reduceNum(lp + ex);
}

// Build a set of "influence numbers" (core + multiples) within a range
function getInfluenceNumbers(coreNums, min, max) {
  const influenced = new Set();
  coreNums.forEach(core => {
    if (!core) return;
    const base = core > 9 ? core % 9 || 9 : core;
    for (let n = min; n <= max; n++) {
      const r = n > 9 ? String(n).split('').reduce((s,d)=>s+parseInt(d),0) : n;
      if (r === base || n === core) influenced.add(n);
    }
  });
  return influenced;
}

// Weighted pick: numbers in influenced set have 3x weight
function weightedPickUnique(rng, count, min, max, influenced) {
  const pool = [];
  for (let i = min; i <= max; i++) {
    const w = influenced.has(i) ? 3 : 1;
    for (let j = 0; j < w; j++) pool.push(i);
  }
  // Fisher-Yates on weighted pool, pick unique
  const seen = new Set();
  const result = [];
  for (let i = pool.length - 1; i > 0 && result.length < count; i--) {
    const j = Math.floor(rng() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
    if (!seen.has(pool[i])) {
      seen.add(pool[i]);
      result.push(pool[i]);
    }
  }
  // Fallback if we didn't get enough
  if (result.length < count) {
    for (let n = min; n <= max && result.length < count; n++) {
      if (!seen.has(n)) result.push(n);
    }
  }
  return result.sort((a, b) => a - b);
}

// Weighted digit pick (with replacement, for Pick 3/4)
function weightedDigits(rng, count, influenced) {
  const pool = [];
  for (let d = 0; d <= 9; d++) {
    const w = influenced.has(d) ? 3 : 1;
    for (let j = 0; j < w; j++) pool.push(d);
  }
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push(pool[Math.floor(rng() * pool.length)]);
  }
  return result;
}

// Current numerology state
let currentNumerology = { lifePath: null, expression: null, destiny: null };

function updateNumerologyPanel() {
  const name = document.getElementById('name').value;
  const dateInputs = document.querySelectorAll('.date-input');
  const dates = [...dateInputs].map(i => i.value).filter(Boolean);

  const lp = dates.length > 0 ? calcLifePath(dates[0]) : null;
  const ex = name.trim() ? calcExpression(name) : null;
  const dest = calcDestiny(lp, ex);

  currentNumerology = { lifePath: lp, expression: ex, destiny: dest };

  const panel = document.getElementById('numerology-panel');
  if (!lp && !ex) { panel.classList.add('hidden'); return; }

  panel.classList.remove('hidden');
  document.getElementById('num-lifepath').textContent = lp || '—';
  document.getElementById('num-expression').textContent = ex || '—';
  document.getElementById('num-destiny').textContent = dest || '—';

  const coreNums = [lp, ex, dest].filter(Boolean);
  const influenced = getInfluenceNumbers(coreNums, 1, 70);
  const topNums = [...influenced].slice(0, 8).join(', ');
  document.getElementById('num-influence').textContent =
    `Your picks are weighted toward: ${topNums}${influenced.size > 8 ? '…' : ''}`;
}

// ── Main generate ─────────────────────────────────────────────────────────
document.getElementById('btn-generate').addEventListener('click', function() {
  const name = document.getElementById('name').value;
  const dateInputs = document.querySelectorAll('.date-input');
  const dates = [...dateInputs].map(i => i.value).filter(Boolean);
  const favorites = document.getElementById('favorites').value;
  const lotteryKey = document.getElementById('lottery-type').value;
  const lottery = LOTTERIES[lotteryKey];

  // Determine if smart recommendation should show
  const isPickGame = (lotteryKey === 'pick3' || lotteryKey === 'pick4');
  const isStateGame = (currentState === 'nc' || currentState === 'sc');
  const showRec = isPickGame && isStateGame;

  // Build numerology influence set
  const { lifePath, expression, destiny } = currentNumerology;
  const coreNums = [lifePath, expression, destiny].filter(Boolean);
  const hasNumerology = coreNums.length > 0;

  // Generate 3 sets
  const results = document.getElementById('results');
  results.innerHTML = '';

  genCount++;
  document.getElementById('gen-count').textContent = `Generation #${genCount}`;

  // Track analytics and update global counter
  const selectedPlayType = (document.querySelector('input[name="play-type"]:checked') || {}).value || null;
  fetch('https://lottery-analytics.wb6yppthkw.workers.dev/track', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ game: lotteryKey, state: currentState, playType: selectedPlayType })
  }).then(() => refreshGlobalCount()).catch(() => {});

  for (let i = 1; i <= 3; i++) {
    const salt = Math.floor(Math.random() * 1e9);
    const setSeed = buildSeed(name, dates, favorites, salt + i * 777);
    const setRng = mulberry32(setSeed);

    let data;
    if (hasNumerology) {
      // Use numerology-weighted generation
      data = generateWithNumerology(setRng, lotteryKey, coreNums);
    } else {
      data = lottery.generate(setRng);
    }

    const label = hasNumerology
      ? `${lottery.label} — Set ${i} ✦`
      : `${lottery.label} — Set ${i}`;
    const block = renderResult(data, label, showRec);
    results.appendChild(block);
  }
});

// ── Numerology-weighted generation ────────────────────────────────────────
function generateWithNumerology(rng, lotteryKey, coreNums) {
  switch (lotteryKey) {
    case 'powerball': {
      const inf = getInfluenceNumbers(coreNums, 1, 69);
      const whites = weightedPickUnique(rng, 5, 1, 69, inf);
      const infBonus = getInfluenceNumbers(coreNums, 1, 26);
      const bonus = weightedPickUnique(rng, 1, 1, 26, infBonus);
      return { whites, bonus, type: 'powerball' };
    }
    case 'megamillions': {
      const inf = getInfluenceNumbers(coreNums, 1, 70);
      const whites = weightedPickUnique(rng, 5, 1, 70, inf);
      const infBonus = getInfluenceNumbers(coreNums, 1, 25);
      const bonus = weightedPickUnique(rng, 1, 1, 25, infBonus);
      return { whites, bonus, type: 'megamillions' };
    }
    case 'pick3': {
      const infD = getInfluenceNumbers(coreNums, 0, 9);
      return { digits: weightedDigits(rng, 3, infD), type: 'pick3' };
    }
    case 'pick4': {
      const infD = getInfluenceNumbers(coreNums, 0, 9);
      return { digits: weightedDigits(rng, 4, infD), type: 'pick4' };
    }
    case 'pick5':
    case 'nc_cash5': {
      const max = lotteryKey === 'nc_cash5' ? 43 : 39;
      const inf = getInfluenceNumbers(coreNums, 1, max);
      return { whites: weightedPickUnique(rng, 5, 1, max, inf), type: lotteryKey };
    }
    case 'sc_palmetto5': {
      const inf = getInfluenceNumbers(coreNums, 1, 38);
      return { whites: weightedPickUnique(rng, 5, 1, 38, inf), type: 'pick5' };
    }
    default: {
      return LOTTERIES[lotteryKey]?.generate(rng) || { whites: [], type: lotteryKey };
    }
  }
}
